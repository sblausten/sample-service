---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-arm-integration-test
  title: Azure ARM Integration Test
  description: >
    Tests the azure-arm integration by fetching Azure resource information via
    the ARM REST API. Requires AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, and
    AZURE_TENANT_ID secrets to be configured in Roadie.
spec:
  owner: roadie
  type: service

  parameters:
    - title: Azure Resource Details
      required:
        - subscriptionId
        - resourceGroupName
      properties:
        subscriptionId:
          title: Subscription ID
          type: string
          description: The Azure subscription ID to query
        resourceGroupName:
          title: Resource Group Name
          type: string
          description: The name of the resource group to list resources in

  steps:
    - id: list-resources
      name: List Azure Resources
      action: http:backstage:request
      input:
        method: GET
        path: >-
          /integrations/azure-arm/request
        headers:
          content-type: application/json
        body:
          backendType: http
          path: >-
            /subscriptions/${{ parameters.subscriptionId }}/resourceGroups/${{ parameters.resourceGroupName }}/resources?api-version=2024-11-01
          method: GET

    - id: log-result
      name: Log Result
      action: debug:log
      input:
        message: 'Azure ARM response code: ${{ steps["list-resources"].output.code }}'

  output:
    text:
      - title: ARM Response Code
        content: '`${{ steps["list-resources"].output.code }}`'
      - title: Resources
        content: '`${{ steps["list-resources"].output.body }}`'
